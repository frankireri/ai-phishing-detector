services:
  - type: web
    name: phishguard-api
    runtime: python
    buildCommand: "pip install -r requirements.txt && python -c \"import nltk; [nltk.download(x, quiet=True) for x in ['stopwords','punkt','wordnet','punkt_tab']]\" && python manage.py init-db && python manage.py train --dataset data/phishing_dataset.csv"
    startCommand: "gunicorn -w 2 -b 0.0.0.0:$PORT run:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///phishing_detector.db
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000
    plan: free
